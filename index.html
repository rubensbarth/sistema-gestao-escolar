<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistema de Gestão Escolar</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Sistema de Gestão Escolar</h1>

<div class="menu">
<button onclick="mostrar('alunos')">Alunos</button>
<button onclick="mostrar('professores')">Professores</button>
<button onclick="mostrar('turmas')">Turmas</button>
</div>

<div id="alunos" class="conteudo">
<h2>Cadastro de Alunos</h2>
<input type="text" placeholder="Nome do aluno">
<button>Salvar</button>
</div>

<div id="professores" class="conteudo">
<h2>Cadastro de Professores</h2>
<input type="text" placeholder="Nome do professor">
<button>Salvar</button>
</div>

<div id="turmas" class="conteudo">
<h2>Controle de Turmas</h2>
<input type="text" placeholder="Nome da turma">
<button>Salvar</button>
</div>

<script src="script.js"></script>

</body>
</html>
